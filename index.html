<!DOCTYPE html>
<html>
<head>
    <title>Forestry Botany - Дерево красителей</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🌳 Дерево получения красителей</h1>

        <div id="tree-container"></div>
        <div id="info"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
